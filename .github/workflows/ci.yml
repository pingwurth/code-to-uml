name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Check JavaScript syntax
      run: |
        node --check serve.js
        node --check demo.js
        node --check i18n-config.js
        node --check install.js
        
    - name: Check HTML validity
      run: |
        # Basic HTML structure check
        for file in *.html; do
          if [ -f "$file" ]; then
            echo "Checking $file..."
            # Check for basic HTML structure
            if ! grep -q "<!DOCTYPE html>" "$file"; then
              echo "Warning: $file may be missing DOCTYPE"
            fi
          fi
        done
        
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test
      
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Verify server starts
      run: |
        timeout 10 node serve.js 5401 &
        sleep 5
        curl -f http://localhost:5401/ || exit 1
        echo "Server started successfully"
        
  security:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security audit
      run: |
        # Check for common security issues
        echo "Checking for hardcoded credentials..."
        if grep -r "password\|secret\|api_key\|token" --include="*.js" --include="*.html" .; then
          echo "Warning: Potential hardcoded credentials found"
          exit 1
        fi
        
        echo "Checking for unsafe eval..."
        if grep -r "eval\|innerHTML\|document.write" --include="*.js" .; then
          echo "Warning: Potentially unsafe code found"
        fi
        
        echo "Security checks passed"
